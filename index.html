<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mugdha Adhav — whatifed.com</title>
    <meta
      name="description"
      content="Mugdha Adhav — personal site. Visit whatifed.com for more."
    />
    <link rel="canonical" href="https://mugdha.dev/" />
    <style>
      :root {
        color-scheme: light dark;
        --fg: #1a1a1a;
        --muted: #666;
        --bg: #fdfdfd;
        --link: #0a66c2;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #ebebec;
          --muted: #9a9a9a;
          --bg: #161618;
          --link: #7ab6ff;
        }
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        line-height: 1.5;
      }
      main {
        max-width: 36rem;
        margin: 0 auto;
        padding: 4rem 1.5rem;
      }
      h1 {
        font-size: 2rem;
        margin: 0 0 0.5rem;
        font-weight: 600;
      }
      p {
        color: var(--muted);
        margin: 0 0 2rem;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      li {
        margin: 0.5rem 0;
      }
      a {
        color: var(--link);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Mugdha Adhav</h1>
      <p>
        My main site is
        <a href="https://whatifed.com">whatifed.com</a> — come say hi.
      </p>
      <ul>
        <li>
          <a href="https://whatifed.com">whatifed.com</a>
        </li>
        <li>
          <a href="https://github.com/mugdha-adhav">GitHub</a>
        </li>
        <li>
          <a href="mailto:mugdha.adhav@gmail.com">Email</a>
        </li>
      </ul>
    </main>
  </body>
</html>
